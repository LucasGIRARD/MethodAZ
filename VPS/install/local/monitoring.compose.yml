name: monitoring

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    user: "472:472"
    environment:
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_EXPLORE_ENABLED: "false"
      GF_QUERY_HISTORY_ENABLED: "false"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_SECURITY_DATA_SOURCE_PROXY_WHITELIST: prometheus:9090 loki:3100
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./work/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./work/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/observability.yml:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${GRAFANA_MEMORY_LIMIT:-384m}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:3000/api/health
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    user: "65534:65534"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-512MB}
      - --web.listen-address=0.0.0.0:9090
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${PROMETHEUS_MEMORY_LIMIT:-512m}
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION}
    pid: host
    command:
      - --path.rootfs=/host
      - --web.listen-address=0.0.0.0:9100
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($$|/)
    volumes:
      - /:/host:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: ${NODE_EXPORTER_MEMORY_LIMIT:-96m}
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
    restart: unless-stopped

  cadvisor:
    profiles:
      - containers
    image: ${CADVISOR_IMAGE:-ghcr.io/google/cadvisor:v0.57.0}
    command:
      - --listen_ip=0.0.0.0
      - --port=8080
      - --docker_only=true
      - --housekeeping_interval=15s
      - --store_container_labels=false
      - --whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${CADVISOR_MEMORY_LIMIT:-384m}
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
    restart: unless-stopped

  loki-init:
    profiles:
      - logs
    image: alpine:${ALPINE_VERSION}
    user: "0:0"
    command:
      - sh
      - -c
      - chown 10001:10001 /loki
    volumes:
      - loki_data:/loki
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    pids_limit: 32
    mem_limit: ${LOKI_INIT_MEMORY_LIMIT:-64m}
    security_opt:
      - no-new-privileges:true
    restart: "no"

  loki:
    profiles:
      - logs
    image: grafana/loki:${LOKI_VERSION}
    user: "10001:10001"
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${LOKI_MEMORY_LIMIT:-512m}
    security_opt:
      - no-new-privileges:true
    depends_on:
      loki-init:
        condition: service_completed_successfully
    networks:
      - monitoring
    restart: unless-stopped

  alloy:
    profiles:
      - logs
    image: grafana/alloy:${ALLOY_VERSION}
    user: "0:0"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy
      - /etc/alloy/config.alloy
    volumes:
      - ./monitoring/alloy.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${ALLOY_MEMORY_LIMIT:-384m}
    security_opt:
      - no-new-privileges:true
    depends_on:
      - loki
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  alloy_data:
