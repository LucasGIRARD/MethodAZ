global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: production

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: node
    static_configs:
      - targets:
          - 127.0.0.1:9100

  - job_name: docker
    static_configs:
      - targets:
          - 127.0.0.1:9323

  - job_name: cadvisor
    static_configs:
      - targets:
          - 127.0.0.1:8080

  - job_name: loki
    static_configs:
      - targets:
          - 127.0.0.1:3100

  - job_name: alloy
    static_configs:
      - targets:
          - 127.0.0.1:12345
