name: databases

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=80
      - -c
      - shared_buffers=192MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password
    secrets:
      - postgres_admin_password
      - linkwarden_db_password
      - davis_db_password
      - freshrss_db_password
      - ttrss_db_password
      - web_db_password
    volumes:
      - ./postgres:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/10-applications.sh:ro
      - ./init-postgres.sh:/usr/local/sbin/reconcile-applications:ro
    networks:
      linkwarden:
        aliases:
          - postgres
      davis:
        aliases:
          - postgres
      freshrss:
        aliases:
          - postgres
      ttrss:
        aliases:
          - postgres
      web:
        aliases:
          - postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 15
    pids_limit: 256
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-512m}
    security_opt:
      - no-new-privileges:true

networks:
  davis:
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-davis
    internal: true
  freshrss:
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-freshrss
    internal: true
  web:
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-web
    internal: true
  linkwarden:
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-linkwarden
    internal: true
  ttrss:
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-ttrss
    internal: true

secrets:
  postgres_admin_password:
    environment: POSTGRES_ADMIN_PASSWORD
  linkwarden_db_password:
    environment: LINKWARDEN_DB_PASSWORD
  davis_db_password:
    environment: DAVIS_DB_PASSWORD
  freshrss_db_password:
    environment: FRESHRSS_DB_PASSWORD
  ttrss_db_password:
    environment: TTRSS_DB_PASSWORD
  web_db_password:
    environment: WEB_DB_PASSWORD
