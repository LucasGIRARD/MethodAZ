name: web

services:
  app:
    build:
      context: .
      args:
        PHP_BASE_IMAGE: ${PHP_BASE_IMAGE}
    image: vps-web:${WEB_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3006:80"
    volumes:
      - ./html:/var/www/html
      - ./apache/000-default.conf:/etc/apache2/sites-available/000-default.conf:ro
    environment:
      DB_DRIVER: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: web
      DB_USER: web
      DB_PASSWORD_FILE: /run/secrets/web_db_password
      WEB_DOMAIN: ${WEB_DOMAIN}
    secrets:
      - web_db_password
    networks:
      - frontend
      - database
    pids_limit: 256
    mem_limit: ${WEB_MEMORY_LIMIT:-384m}
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - "$$s=@fsockopen('127.0.0.1',80,$$e,$$m,5);exit($$s?0:1);"
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
  database:
    external: true
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-web

secrets:
  web_db_password:
    environment: WEB_DB_PASSWORD
