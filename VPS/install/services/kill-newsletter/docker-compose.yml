name: kill-newsletter

services:
  app:
    build:
      context: ./app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:8000"
    volumes:
      - ./data:/app/data
    pids_limit: 256
    mem_limit: ${KILL_NEWSLETTER_MEMORY_LIMIT:-384m}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const http=require('http');const r=http.get('http://127.0.0.1:8000/',s=>process.exit(s.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>{r.destroy();process.exit(1)})"
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
