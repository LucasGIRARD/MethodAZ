name: kill-newsletter

services:
  data-init:
    image: alpine:${ALPINE_VERSION:-3.22.4}
    user: "0:0"
    command:
      - sh
      - -c
      - chown 1000:1000 /app/data
    volumes:
      - ./data:/app/data
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    pids_limit: 32
    mem_limit: 32m
    security_opt:
      - no-new-privileges:true
    restart: "no"

  app:
    build:
      context: ./app
      dockerfile: ../Dockerfile
      args:
        NODE_IMAGE: ${KILL_NEWSLETTER_NODE_IMAGE:-node:24-bookworm-slim}
    restart: unless-stopped
    environment:
      KILL_NEWSLETTER_HOSTNAME: ${KILL_NEWSLETTER_HOSTNAME:-localhost}
      KILL_NEWSLETTER_ADMIN_EMAIL: ${KILL_NEWSLETTER_ADMIN_EMAIL:-local@example.invalid}
    depends_on:
      data-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:3005:8000"
    volumes:
      - ./data:/app/data
      - ./configuration.mjs:/etc/kill-newsletter/configuration.mjs:ro
    pids_limit: 256
    mem_limit: ${KILL_NEWSLETTER_MEMORY_LIMIT:-384m}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const http=require('http');const r=http.get('http://127.0.0.1:8000/',s=>process.exit(s.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>{r.destroy();process.exit(1)})"
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
