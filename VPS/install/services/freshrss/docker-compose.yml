name: freshrss

services:
  app:
    image: freshrss/freshrss:${FRESHRSS_VERSION}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"
    environment:
      TZ: ${TIMEZONE}
      CRON_MIN: "*/20"
    volumes:
      - ./data:/var/www/FreshRSS/data
      - ./extensions:/var/www/FreshRSS/extensions
    networks:
      - frontend
      - database
    pids_limit: 256
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
  database:
    external: true
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-freshrss
