name: freshrss

services:
  app:
    image: freshrss/freshrss:${FRESHRSS_VERSION}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"
    environment:
      TZ: ${TIMEZONE}
      CRON_MIN: "*/20"
    volumes:
      - ./data:/var/www/FreshRSS/data
      - ./extensions:/var/www/FreshRSS/extensions
    networks:
      - frontend
      - database
    pids_limit: 256
    mem_limit: ${FRESHRSS_MEMORY_LIMIT:-384m}
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - "$$s=@fsockopen('127.0.0.1',80,$$e,$$m,5);exit($$s?0:1);"
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
  database:
    external: true
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-freshrss
