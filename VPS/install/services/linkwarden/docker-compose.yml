name: linkwarden

services:
  app:
    image: ghcr.io/linkwarden/linkwarden:${LINKWARDEN_VERSION}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://linkwarden:${LINKWARDEN_DB_PASSWORD}@postgres:5432/linkwarden
      NEXTAUTH_SECRET: ${LINKWARDEN_NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${LINKWARDEN_URL}
      NEXT_PUBLIC_DISABLE_REGISTRATION: ${LINKWARDEN_DISABLE_REGISTRATION}
      TZ: ${TIMEZONE}
    volumes:
      - ./data:/data/data
    networks:
      - frontend
      - database
    pids_limit: 256
    mem_limit: ${LINKWARDEN_MEMORY_LIMIT:-768m}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const http=require('http');const r=http.get('http://127.0.0.1:3000/',s=>process.exit(s.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>{r.destroy();process.exit(1)})"
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 45s
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
  database:
    external: true
    name: ${DATABASE_NETWORK_PREFIX:-vps-db}-linkwarden
