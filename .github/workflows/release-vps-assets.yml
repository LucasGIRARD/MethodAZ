name: Assets release VPS

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Tag de release à compléter
        required: true

permissions:
  contents: write

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Vérifier le tag
        run: |
          test -n "$TAG_NAME"

      - name: Récupérer le dépôt au tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Préparer les assets
        run: |
          mkdir -p /tmp/vps-release-assets
          cp VPS/install/scripts/fetch-vps.sh /tmp/vps-release-assets/fetch-vps.sh
          cp VPS/install/scripts/fetch-vps.ps1 /tmp/vps-release-assets/fetch-vps.ps1
          cp VPS/install/config/vps.env.example /tmp/vps-release-assets/vps.env.example
          cp VPS/install/config/secrets.env.example /tmp/vps-release-assets/secrets.env.example
          chmod 0644 /tmp/vps-release-assets/*

      - name: Publier les assets sur la release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" /tmp/vps-release-assets/* --clobber
