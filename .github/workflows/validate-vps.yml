name: Validation VPS

on:
  push:
    paths:
      - "VPS/**"
      - ".github/workflows/validate-vps.yml"
  pull_request:
    paths:
      - "VPS/**"
      - ".github/workflows/validate-vps.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Installer ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Préparer les fichiers de validation
        working-directory: VPS
        run: |
          cp install/config/vps.env.example install/config/vps.env
          sh install/scripts/generate-secrets.sh install/config/secrets.env

      - name: Vérifier les scripts POSIX
        run: |
          find VPS/install -type f \
            \( -name '*.sh' -o -path '*/scripts/vps-*' \) \
            -print0 \
            | xargs -0 shellcheck --shell=sh

      - name: Vérifier les projets Compose
        working-directory: VPS
        run: sh install/scripts/validate-bundle.sh

      - name: Vérifier PowerShell, Markdown et les références
        working-directory: VPS
        shell: pwsh
        run: ./install/scripts/validate-repository.ps1

      - name: Installer Gitleaks
        run: |
          curl -fsSLo /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" \
            | sha256sum --check -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks

      - name: Détecter les secrets accidentels
        run: /tmp/gitleaks git --redact --no-banner .
